<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B Smart CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white shadow-sm p-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xl font-bold text-blue-700 flex items-center gap-2">
            <i data-lucide="building-2"></i> B2B Smart CRM
        </h1>
        <div class="flex gap-2">
            <button onclick="showSection('search')" class="p-2 hover:bg-slate-100 rounded-full text-slate-600">
                <i data-lucide="search"></i>
            </button>
            <button onclick="showSection('add')" class="p-2 hover:bg-slate-100 rounded-full text-slate-600">
                <i data-lucide="plus-circle"></i>
            </button>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center p-4">
        
        <!-- Directory Section (Replaces Deck) -->
        <div id="directory-section" class="w-full max-w-2xl">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-slate-800">Company Directory</h2>
                <button onclick="refreshDirectory()" class="text-sm text-blue-600 flex items-center gap-1 hover:underline">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i> Refresh
                </button>
            </div>
            <div id="directory-container" class="space-y-4 pb-20">
                <!-- Companies loaded here via JS -->
            </div>
        </div>

        <!-- Search Section -->
        <div id="search-section" class="hidden w-full max-w-2xl">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-xl font-bold mb-2 text-slate-800">Semantic Lead Discovery</h2>
                <p class="text-sm text-slate-500 mb-4">e.g., "Large tech companies in EMEA with high revenue"</p>
                <div class="flex gap-2">
                    <input type="text" id="search-input" placeholder="Describe the companies you're looking for..." class="flex-grow p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    <button id="search-btn" onclick="handleSearch()" class="bg-blue-600 text-white p-3 rounded-xl hover:bg-blue-700 transition">
                        <i data-lucide="arrow-right"></i>
                    </button>
                </div>
                <div id="search-results" class="mt-6 space-y-4"></div>
            </div>
        </div>

        <!-- Add Lead Section (Replaces Upload) -->
        <div id="add-section" class="hidden w-full max-w-2xl">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-xl font-bold mb-2 text-slate-800">Add New Lead (AI Parsing)</h2>
                <p class="text-sm text-slate-500 mb-4">Paste unstructured sales notes below. Gemini AI will automatically extract industry, revenue, region, and size.</p>
                
                <textarea id="sales-notes" rows="6" placeholder="Meeting notes: Met with the VP of a mid-sized healthcare company based in APAC. They are pulling in roughly $50M annually and looking to sign a contract soon..." class="w-full p-4 border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 mb-4 text-slate-700"></textarea>
                
                <div id="upload-status" class="hidden p-4 bg-blue-50 text-blue-700 rounded-xl mb-4 text-sm flex items-center gap-2 border border-blue-100">
                    <i data-lucide="loader" class="animate-spin w-4 h-4"></i>
                    <span id="status-text">Analyzing notes and mapping to CRM schema...</span>
                </div>
                
                <button id="upload-btn" onclick="handleAddLead()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-sm">
                    Analyze & Add Company
                </button>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bg-white border-t border-slate-200 p-4 flex justify-around items-center fixed bottom-0 w-full z-50 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <button onclick="showSection('directory')" class="flex flex-col items-center text-blue-600 nav-btn" id="nav-directory">
            <i data-lucide="contact"></i><span class="text-xs mt-1 font-medium">Directory</span>
        </button>
        <button onclick="showSection('search')" class="flex flex-col items-center text-slate-400 nav-btn hover:text-blue-500 transition" id="nav-search">
            <i data-lucide="compass"></i><span class="text-xs mt-1 font-medium">Discover</span>
        </button>
        <button onclick="showSection('add')" class="flex flex-col items-center text-slate-400 nav-btn hover:text-blue-500 transition" id="nav-add">
            <i data-lucide="briefcase"></i><span class="text-xs mt-1 font-medium">Add Lead</span>
        </button>
    </nav>

<script>
    lucide.createIcons();

    // The backend injects the initial CRM data here
    let companies = {{ companies | tojson | safe if companies else '[]' }};
    
    function showSection(sectionId) {
        ['directory-section', 'search-section', 'add-section'].forEach(id => {
            document.getElementById(id).classList.add('hidden');
        });
        document.getElementById(sectionId + '-section').classList.remove('hidden');

        // Update nav styling
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.classList.remove('text-blue-600');
            btn.classList.add('text-slate-400');
        });
        document.getElementById('nav-' + sectionId).classList.add('text-blue-600');
        document.getElementById('nav-' + sectionId).classList.remove('text-slate-400');

        if (sectionId === 'directory') renderDirectory(companies, 'directory-container');
    }

    async function refreshDirectory() {
        const container = document.getElementById('directory-container');
        container.innerHTML = `<div class="flex flex-col items-center py-10 text-slate-400"><i data-lucide="loader" class="animate-spin mb-2 w-8 h-8"></i><p>Loading CRM Data...</p></div>`;
        lucide.createIcons();

        try {
            const response = await fetch('/api/companies');
            if (!response.ok) throw new Error("Network response was not ok");
            companies = await response.json();
            renderDirectory(companies, 'directory-container');
        } catch (error) {
            container.innerHTML = `<div class="text-red-500 text-center py-10 bg-red-50 rounded-xl">Failed to load: ${error.message}</div>`;
        }
    }

    function renderDirectory(data, targetElementId) {
        const container = document.getElementById(targetElementId);
        
        if (!data || data.length === 0) {
            container.innerHTML = `<div class='p-8 text-center bg-white rounded-2xl shadow-sm border border-slate-200'><p class='text-slate-500'>No companies found.</p></div>`;
            return;
        }

        container.innerHTML = data.map(c => `
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 hover:shadow-md transition">
                <div class="flex justify-between items-start mb-3">
                    <div>
                        <span class="text-xs font-bold text-blue-600 uppercase tracking-wider bg-blue-50 px-2 py-1 rounded-md">${c.industry || 'Unknown'}</span>
                        <h3 class="text-lg font-bold text-slate-800 mt-2">${c.company_id}</h3>
                    </div>
                    <span class="px-3 py-1 text-xs font-bold rounded-full border ${getStatusStyle(c.contract_status)}">
                        ${c.contract_status || 'Lead'}
                    </span>
                </div>
                
                <div class="grid grid-cols-2 gap-3 mt-4 text-sm text-slate-600 bg-slate-50 p-3 rounded-xl">
                    <div class="flex items-center gap-2"><i data-lucide="globe-2" class="w-4 h-4 text-slate-400"></i> ${c.region || 'N/A'}</div>
                    <div class="flex items-center gap-2"><i data-lucide="users" class="w-4 h-4 text-slate-400"></i> ${c.company_size || 'N/A'}</div>
                    <div class="flex items-center gap-2 col-span-2"><i data-lucide="coins" class="w-4 h-4 text-slate-400"></i> ${c.annual_revenue || 'N/A'}</div>
                </div>

                <div class="mt-4 flex gap-2 border-t border-slate-100 pt-4">
                    <button onclick="updateStatus('${c.company_id}', 'Active')" class="flex-1 bg-green-50 text-green-700 py-2 rounded-lg text-sm font-semibold hover:bg-green-100 transition">Mark Active</button>
                    <button onclick="updateStatus('${c.company_id}', 'Churned')" class="flex-1 bg-red-50 text-red-700 py-2 rounded-lg text-sm font-semibold hover:bg-red-100 transition">Mark Churned</button>
                </div>
            </div>
        `).join('');
        
        lucide.createIcons();
    }

    function getStatusStyle(status) {
        if (!status) return 'bg-slate-100 text-slate-600 border-slate-200';
        const s = status.toLowerCase();
        if (s.includes('active')) return 'bg-green-100 text-green-700 border-green-200';
        if (s.includes('churn')) return 'bg-red-100 text-red-700 border-red-200';
        return 'bg-blue-100 text-blue-700 border-blue-200'; // Leads
    }

    async function updateStatus(companyId, newStatus) {
        try {
            const response = await fetch('/api/update-company', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ company_id: companyId, contract_status: newStatus })
            });
            const data = await response.json();
            if (data.status === 'success') {
                // Instantly sync the local memory object and re-render
                companies = companies.map(c => c.company_id === companyId ? { ...c, contract_status: newStatus } : c);
                renderDirectory(companies, 'directory-container');
                
                // If the user is currently looking at search results, re-render those too
                if (!document.getElementById('search-section').classList.contains('hidden')) {
                    handleSearch(); // Soft refresh on search
                }
            } else {
                alert("Failed to update status: " + data.error);
            }
        } catch (err) {
            console.error("Update failed:", err);
            alert("An error occurred updating the database.");
        }
    }

    async function handleSearch() {
        const query = document.getElementById('search-input').value;
        const resDiv = document.getElementById('search-results');
        const searchBtn = document.getElementById('search-btn');

        if (!query) return;

        resDiv.innerHTML = `<div class="flex justify-center py-10"><i data-lucide="loader" class="animate-spin text-blue-500 w-8 h-8"></i></div>`;
        lucide.createIcons();
        searchBtn.disabled = true;

        try {
            const response = await fetch(`/api/search?query=${encodeURIComponent(query)}`);
            if (!response.ok) throw new Error("Search failed");
            
            const hits = await response.json();

            if (hits.length === 0) {
                resDiv.innerHTML = `<div class="text-center py-10 text-slate-500 bg-slate-50 rounded-xl">No AI semantic matches found...</div>`;
            } else {
                renderDirectory(hits, 'search-results'); // Re-use the render logic
            }
        } catch (err) {
            resDiv.innerHTML = `<div class="text-red-500 text-center py-6 text-sm bg-red-50 rounded-xl">Search failed: ${err.message}</div>`;
        } finally {
            searchBtn.disabled = false;
        }
    }

    async function handleAddLead() {
        const notes = document.getElementById('sales-notes').value;

        if (!notes) {
            alert("Please paste your sales notes to analyze!");
            return;
        }

        const statusDiv = document.getElementById('upload-status');
        const statusText = document.getElementById('status-text');
        const uploadBtn = document.getElementById('upload-btn');
        
        statusDiv.classList.remove('hidden');
        uploadBtn.disabled = true;
        
        statusDiv.innerHTML = `<i data-lucide="loader" class="animate-spin w-4 h-4"></i> Analyzing via Gemini AI...`;
        lucide.createIcons();

        const formData = new FormData();
        formData.append('sales_notes', notes);

        try {
            const response = await fetch('/api/add-company', { method: 'POST', body: formData });
            const result = await response.json();
            
            if (result.status === 'success') {
                statusDiv.classList.replace('bg-blue-50', 'bg-green-50');
                statusDiv.classList.replace('text-blue-700', 'text-green-700');
                statusDiv.classList.replace('border-blue-100', 'border-green-200');
                statusDiv.innerHTML = `<i data-lucide="check-circle" class="w-5 h-5"></i> Successfully mapped and added: ${result.company_id}`;
                document.getElementById('sales-notes').value = '';
                
                // Refresh main directory quietly
                refreshDirectory();
            } else {
                throw new Error(result.error || 'Unknown Error');
            }
        } catch (err) { 
            statusDiv.classList.replace('bg-blue-50', 'bg-red-50');
            statusDiv.classList.replace('text-blue-700', 'text-red-700');
            statusDiv.innerHTML = `<i data-lucide="alert-circle" class="w-5 h-5"></i> Error adding lead: ${err.message}`;
        } finally {
            uploadBtn.disabled = false;
            lucide.createIcons();
        }
    }

    // Initial render
    renderDirectory(companies, 'directory-container');

</script>
</body>
</html>
